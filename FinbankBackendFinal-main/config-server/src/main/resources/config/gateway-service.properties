server.port=8080

eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# ---------------- CUSTOMER SERVICE ----------------
spring.cloud.gateway.routes[0].id=customer-service
spring.cloud.gateway.routes[0].uri=lb://customer-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/customer/**,/profile/**

# ---------------- LOAN SERVICE ----------------
spring.cloud.gateway.routes[1].id=loan-service
spring.cloud.gateway.routes[1].uri=lb://loan-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/loan/**,/loans/**

# ---------------- ADMIN SERVICE ----------------
spring.cloud.gateway.routes[2].id=admin-service
spring.cloud.gateway.routes[2].uri=lb://admin-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/admin/**,/auth/**,/customer-profile/**

# ---------------- EMI SERVICE ----------------
spring.cloud.gateway.routes[3].id=emi-service
spring.cloud.gateway.routes[3].uri=lb://emi-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/emi/**,/emis/**

# ---------------- SPRING AI SERVICE ----------------
spring.cloud.gateway.routes[4].id=spring-ai-demo
spring.cloud.gateway.routes[4].uri=lb://spring-ai-demo
spring.cloud.gateway.routes[4].predicates[0]=Path=/ai/**

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedOrigins=http://localhost:4200
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowCredentials=true















